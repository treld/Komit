<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komit — Менеджер плагинов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ========== Импорт шрифтов ========== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        /* ========== Переменные ========== */
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #0d1117;
            --bg-card: #111820;
            --bg-hover: #1a2332;
            --bg-active: #1c2a3f;
            --border-color: #1c2333;
            --border-hover: #2d3548;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --text-muted: #5c6574;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #f0883e;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-modal: 0 24px 64px rgba(0, 0, 0, 0.6);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --header-height: 64px;
            --sidebar-width: 240px;
        }

        /* ========== Базовые стили ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        /* ========== Сайдбар ========== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 12px;
            flex-shrink: 0;
            z-index: 100;
            height: 100vh;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 8px 16px 8px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3);
            flex-shrink: 0;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .brand-version {
            font-size: 10px;
            color: var(--text-muted);
            -webkit-text-fill-color: var(--text-muted);
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }

        .nav-link i {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .nav-link:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: var(--bg-active);
            color: var(--accent-blue);
        }

        .nav-link.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--accent-blue);
            border-radius: 0 4px 4px 0;
        }

        .nav-badge {
            margin-left: auto;
            background: var(--bg-hover);
            color: var(--text-secondary);
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            transition: var(--transition);
            min-width: 20px;
            text-align: center;
        }

        .nav-link.active .nav-badge {
            background: var(--accent-blue);
            color: white;
        }

        .nav-badge.updates-available {
            background: var(--accent-orange);
            color: white;
            animation: pulse-badge 2s infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .sidebar-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            margin-top: auto;
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-indicator {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .status-indicator.online {
            background: var(--accent-green);
            box-shadow: 0 0 12px rgba(63, 185, 80, 0.4);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ========== Основная область ========== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* ========== Топбар ========== */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            gap: 12px;
            min-height: var(--header-height);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .page-title i {
            color: var(--accent-blue);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            max-width: 500px;
        }

        .search-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
            font-size: 13px;
            pointer-events: none;
        }

        .search-wrapper input {
            width: 100%;
            padding: 8px 14px 8px 36px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            height: 36px;
        }

        .search-wrapper input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .search-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .search-clear {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px;
            display: none;
        }

        .search-clear:hover {
            color: var(--text-primary);
        }

        /* ========== Контент ========== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
        }

        .content::-webkit-scrollbar {
            width: 4px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }

        .content::-webkit-scrollbar-thumb:hover {
            background: var(--border-hover);
        }

        /* ========== Сетка плагинов ========== */
        .plugins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        /* ========== Карточка плагина ========== */
        .plugin-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 16px;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .plugin-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
            opacity: 0;
            transition: var(--transition);
        }

        .plugin-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-card);
        }

        .plugin-card:hover::before {
            opacity: 1;
        }

        .plugin-card.running::before {
            background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
            opacity: 1;
        }

        .plugin-card-header {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }

        .plugin-icon-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .plugin-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
        }

        .plugin-icon-placeholder {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--bg-hover), var(--bg-active));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .plugin-status-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--bg-card);
            background: var(--text-muted);
        }

        .plugin-status-dot.running {
            background: var(--accent-green);
            box-shadow: 0 0 12px rgba(63, 185, 80, 0.4);
        }

        .plugin-status-dot.stopped {
            background: var(--accent-red);
        }

        .plugin-info {
            flex: 1;
            min-width: 0;
        }

        .plugin-name-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 1px;
        }

        .plugin-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .plugin-version-badge {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-primary);
            padding: 1px 8px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .plugin-author {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .plugin-author i {
            font-size: 10px;
            color: var(--text-muted);
        }

        .plugin-author span {
            color: var(--accent-blue);
        }

        .plugin-description {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin: 6px 0 10px 0;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .plugin-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 10px;
        }

        .tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .tag-installed {
            background: rgba(63, 185, 80, 0.15);
            border-color: rgba(63, 185, 80, 0.3);
            color: var(--accent-green);
        }

        .tag-running {
            background: rgba(88, 166, 255, 0.15);
            border-color: rgba(88, 166, 255, 0.3);
            color: var(--accent-blue);
        }

        .tag-stopped {
            background: rgba(248, 81, 73, 0.15);
            border-color: rgba(248, 81, 73, 0.3);
            color: var(--accent-red);
        }

        .tag-update {
            background: rgba(240, 136, 62, 0.15);
            border-color: rgba(240, 136, 62, 0.3);
            color: var(--accent-orange);
            animation: pulse-tag 2s infinite;
        }

        @keyframes pulse-tag {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .tag-available {
            background: rgba(88, 166, 255, 0.15);
            border-color: rgba(88, 166, 255, 0.3);
            color: var(--accent-blue);
        }

        .plugin-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }

        /* ========== Кнопки ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            white-space: nowrap;
            height: 28px;
        }

        .btn i {
            font-size: 12px;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), #4a8dd4);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--accent-green), #2d8f3e);
            color: white;
        }

        .btn-success:hover {
            box-shadow: 0 4px 12px rgba(63, 185, 80, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--accent-red), #d43d3a);
            color: white;
        }

        .btn-danger:hover {
            box-shadow: 0 4px 12px rgba(248, 81, 73, 0.3);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--accent-orange), #d47c2e);
            color: white;
        }

        .btn-warning:hover {
            box-shadow: 0 4px 12px rgba(240, 136, 62, 0.3);
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--border-hover);
            color: var(--text-primary);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            justify-content: center;
        }

        .btn-ghost:hover {
            background: var(--bg-hover);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 10px;
            height: 24px;
        }

        .btn-sm i {
            font-size: 10px;
        }

        .btn-block {
            width: 100%;
            justify-content: center;
        }

        /* ========== Состояния загрузки ========== */
        .loading-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state .empty-icon {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* ========== Модальное окно (перемещаемое) ========== */
        .modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal.active {
            display: flex;
        }

        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            animation: fade-in 0.3s ease;
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-dialog {
            position: relative;
            width: 100%;
            max-width: 720px;
            max-height: 85vh;
            animation: slide-up 0.3s ease;
            /* Для перетаскивания */
            cursor: default;
        }

        /* Когда перетаскиваем - отключаем анимацию */
        .modal.dragging .modal-dialog {
            animation: none;
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            max-height: 85vh;
            box-shadow: var(--shadow-modal);
            overflow: hidden;
        }

        /* Заголовок модального окна - область для перетаскивания */
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            cursor: grab;
            user-select: none;
            background: var(--bg-secondary);
            border-radius: var(--radius-md) var(--radius-md) 0 0;
        }

        .modal-header:active {
            cursor: grabbing;
        }

        .modal-title {
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }

        .modal-title i {
            font-size: 18px;
            color: var(--accent-blue);
        }

        .modal-title h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-hover);
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .modal-close:hover {
            background: var(--border-hover);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 16px 20px;
            overflow: auto;
            flex: 1;
        }

        .modal-body::-webkit-scrollbar {
            width: 4px;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }

        .config-editor-wrapper {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .editor-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 14px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
        }

        .editor-language {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #configEditor {
            width: 100%;
            min-height: 280px;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: none;
            padding: 14px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.7;
            resize: vertical;
            outline: none;
        }

        #configEditor:focus {
            outline: none;
        }

        .modal-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            padding: 12px 20px;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
            background: var(--bg-secondary);
            border-radius: 0 0 var(--radius-md) var(--radius-md);
        }

        /* ========== Toast уведомления ========== */
        #toastContainer {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 360px;
            width: 100%;
        }

        .toast {
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slide-in 0.4s ease;
            box-shadow: var(--shadow-card);
        }

        .toast i {
            font-size: 16px;
        }

        .toast-success {
            border-color: var(--accent-green);
        }
        .toast-success i {
            color: var(--accent-green);
        }

        .toast-error {
            border-color: var(--accent-red);
        }
        .toast-error i {
            color: var(--accent-red);
        }

        .toast-info {
            border-color: var(--accent-blue);
        }
        .toast-info i {
            color: var(--accent-blue);
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ========== Адаптивность ========== */
        @media (max-width: 1200px) {
            .plugins-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            }
        }

        @media (max-width: 992px) {
            .plugins-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
            .topbar {
                padding: 10px 16px;
            }
            .content {
                padding: 12px 16px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 56px;
                padding: 12px 4px;
            }

            .brand-text,
            .nav-link span,
            .nav-badge,
            .sidebar-footer .status-label,
            .sidebar-footer .btn span {
                display: none;
            }

            .brand-icon {
                width: 32px;
                height: 32px;
                font-size: 14px;
                margin: 0 auto;
            }

            .nav-link {
                justify-content: center;
                padding: 8px;
            }

            .nav-link i {
                font-size: 16px;
                margin: 0;
            }

            .topbar {
                padding: 8px 12px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .topbar-right {
                max-width: 100%;
                flex: 1 1 100%;
                order: 2;
            }

            .page-title {
                font-size: 16px;
            }

            .content {
                padding: 12px;
            }

            .plugins-grid {
                grid-template-columns: 1fr;
            }

            .modal-dialog {
                max-width: 95%;
                margin: 10px;
            }
        }

        @media (max-width: 480px) {
            .topbar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .topbar-left {
                justify-content: center;
            }

            .topbar-right {
                flex-direction: column;
            }

            .plugin-card-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .plugin-actions {
                justify-content: center;
            }
        }

        /* ========== Специфичные для Windows-приложения ========== */
        .btn, .nav-link, .modal-close, .search-wrapper input {
            cursor: default;
        }
        .btn:hover, .nav-link:hover, .modal-close:hover {
            cursor: pointer;
        }
        .search-wrapper input:hover,
        .search-wrapper input:focus {
            cursor: text;
        }

        .content::-webkit-scrollbar {
            width: 4px;
        }
        .content::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        .content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }
        .content::-webkit-scrollbar-thumb:hover {
            background: var(--border-hover);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">
                <i class="fas fa-cubes"></i>
            </div>
            <div class="brand-text">
                <span class="brand-name">Komit</span>
                <span class="brand-version">v1.0</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-link active" data-tab="all">
                <i class="fas fa-th-large"></i>
                <span>Все плагины</span>
                <span class="nav-badge" id="total-count">0</span>
            </a>
            <a href="#" class="nav-link" data-tab="installed">
                <i class="fas fa-check-circle"></i>
                <span>Установленные</span>
                <span class="nav-badge" id="installed-count">0</span>
            </a>
            <a href="#" class="nav-link" data-tab="updates">
                <i class="fas fa-sync-alt"></i>
                <span>Обновления</span>
                <span class="nav-badge" id="updates-count">0</span>
            </a>
            <a href="#" class="nav-link" data-tab="running">
                <i class="fas fa-play-circle"></i>
                <span>Запущенные</span>
                <span class="nav-badge" id="running-count">0</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button onclick="rescanPlugins()" class="btn btn-ghost btn-block">
                <i class="fas fa-sync-alt"></i>
                <span>Сканировать</span>
            </button>
            <div class="system-status">
                <span class="status-indicator online"></span>
                <span class="status-label">Система работает</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="page-title" id="pageTitle">
                    <i class="fas fa-th-large"></i>
                    Все плагины
                </h1>
            </div>
            <div class="topbar-right">
                <div class="search-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Поиск плагинов..." oninput="filterPlugins()">
                    <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none;">
                        <i class="fas fa-times-circle"></i>
                    </button>
                </div>
                <button onclick="checkAllUpdates()" class="btn btn-primary">
                    <i class="fas fa-sync-alt"></i>
                    <span>Обновить</span>
                </button>
            </div>
        </header>

        <section class="content">
            <div class="plugins-grid" id="pluginsContainer">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Загрузка плагинов...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Plugin Config Modal (перемещаемое) -->
    <div id="configModal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-dialog" id="modalDialog">
            <div class="modal-content">
                <div class="modal-header" id="modalHeader">
                    <div class="modal-title">
                        <i class="fas fa-sliders-h"></i>
                        <h2 id="configTitle">Конфигурация</h2>
                    </div>
                    <button class="modal-close" onclick="closeConfig()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="config-editor-wrapper">
                        <div class="editor-toolbar">
                            <span class="editor-language">JSON</span>
                            <button onclick="formatConfig()" class="btn btn-sm btn-secondary">
                                <i class="fas fa-code"></i> Форматировать
                            </button>
                        </div>
                        <textarea id="configEditor" spellcheck="false"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button onclick="closeConfig()" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Отмена
                    </button>
                    <button onclick="saveConfig()" class="btn btn-success">
                        <i class="fas fa-save"></i> Сохранить
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script>
        // ========== Состояние ==========
        let allPlugins = [];
        let currentTab = 'all';
        let configPluginId = null;

        // ========== Перетаскивание модального окна ==========
        (function() {
            let isDragging = false;
            let offsetX, offsetY;
            let modal = document.getElementById('configModal');
            let dialog = document.getElementById('modalDialog');
            let header = document.getElementById('modalHeader');

            function onDragStart(e) {
                if (!modal.classList.contains('active')) return;
                // Не перетаскиваем если кликнули по кнопке закрытия
                if (e.target.closest('.modal-close')) return;

                isDragging = true;
                modal.classList.add('dragging');

                const rect = dialog.getBoundingClientRect();
                const clientX = e.clientX || e.touches?.[0]?.clientX || 0;
                const clientY = e.clientY || e.touches?.[0]?.clientY || 0;

                offsetX = clientX - rect.left;
                offsetY = clientY - rect.top;

                dialog.style.cursor = 'grabbing';
                document.body.style.userSelect = 'none';
                e.preventDefault();
            }

            function onDragMove(e) {
                if (!isDragging) return;

                const clientX = e.clientX || e.touches?.[0]?.clientX || 0;
                const clientY = e.clientY || e.touches?.[0]?.clientY || 0;

                let x = clientX - offsetX;
                let y = clientY - offsetY;

                // Ограничиваем чтобы окно не выходило за пределы экрана
                const modalRect = modal.getBoundingClientRect();
                const dialogRect = dialog.getBoundingClientRect();
                const maxX = modalRect.width - dialogRect.width;
                const maxY = modalRect.height - dialogRect.height;

                x = Math.max(0, Math.min(x, maxX));
                y = Math.max(0, Math.min(y, maxY));

                dialog.style.left = x + 'px';
                dialog.style.top = y + 'px';
                dialog.style.transform = 'none';

                e.preventDefault();
            }

            function onDragEnd() {
                if (isDragging) {
                    isDragging = false;
                    modal.classList.remove('dragging');
                    dialog.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            }

            // Мышиные события
            header.addEventListener('mousedown', onDragStart);
            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('mouseup', onDragEnd);

            // Touch события для мобильных
            header.addEventListener('touchstart', onDragStart, { passive: false });
            document.addEventListener('touchmove', onDragMove, { passive: false });
            document.addEventListener('touchend', onDragEnd);

            // Сброс позиции при открытии
            const originalOpen = openConfig;
            window.openConfig = function(pluginId) {
                dialog.style.left = '';
                dialog.style.top = '';
                dialog.style.transform = '';
                modal.classList.remove('dragging');
                originalOpen(pluginId);
            };

            // Закрытие при клике на backdrop
            document.querySelector('.modal-backdrop').addEventListener('mousedown', function(e) {
                if (e.target === this) closeConfig();
            });
        })();

        // ========== Инициализация ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadPlugins();

            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                    currentTab = this.dataset.tab;
                    updatePageTitle();
                    filterPlugins();
                });
            });

            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function() {
                document.getElementById('searchClear').style.display = this.value ? 'block' : 'none';
                filterPlugins();
            });
        });

        // ========== API ==========
        function loadPlugins() {
            showLoading();

            fetch('/api/plugins')
                .then(res => {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(plugins => {
                    allPlugins = plugins;
                    updateBadges();
                    filterPlugins();
                })
                .catch(error => {
                    showToast('❌ Ошибка загрузки: ' + error.message, 'error');
                    document.getElementById('pluginsContainer').innerHTML = `
                        <div class="empty-state">
                            <span class="empty-icon">🔌</span>
                            <h3>Не удалось загрузить плагины</h3>
                            <p>${error.message}</p>
                            <button onclick="loadPlugins()" class="btn btn-primary" style="margin-top:12px;">
                                <i class="fas fa-redo"></i> Попробовать снова
                            </button>
                        </div>
                    `;
                });
        }

        function updateBadges() {
            const installed = allPlugins.filter(p => p.is_installed);
            const updates = allPlugins.filter(p => p.has_update);
            const running = allPlugins.filter(p => p.is_running);

            document.getElementById('total-count').textContent = allPlugins.length;
            document.getElementById('installed-count').textContent = installed.length;
            document.getElementById('updates-count').textContent = updates.length;
            document.getElementById('running-count').textContent = running.length;

            const updatesBadge = document.querySelector('.nav-link[data-tab="updates"] .nav-badge');
            if (updates.length > 0) {
                updatesBadge.classList.add('updates-available');
            } else {
                updatesBadge.classList.remove('updates-available');
            }
        }

        function updatePageTitle() {
            const titles = {
                'all': 'Все плагины',
                'installed': 'Установленные',
                'updates': 'Обновления',
                'running': 'Запущенные'
            };
            const icons = {
                'all': 'fa-th-large',
                'installed': 'fa-check-circle',
                'updates': 'fa-sync-alt',
                'running': 'fa-play-circle'
            };
            document.querySelector('.page-title').innerHTML =
                `<i class="fas ${icons[currentTab] || icons.all}"></i> ${titles[currentTab] || 'Все плагины'}`;
        }

        function filterPlugins() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            let filtered = allPlugins;

            if (currentTab === 'installed') {
                filtered = filtered.filter(p => p.is_installed);
            } else if (currentTab === 'updates') {
                filtered = filtered.filter(p => p.has_update);
            } else if (currentTab === 'running') {
                filtered = filtered.filter(p => p.is_running);
            }

            if (search) {
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(search) ||
                    p.description.toLowerCase().includes(search) ||
                    p.author.toLowerCase().includes(search)
                );
            }

            renderPlugins(filtered);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchClear').style.display = 'none';
            filterPlugins();
        }

        // ========== Рендеринг ==========
        function renderPlugins(plugins) {
            const container = document.getElementById('pluginsContainer');

            if (!plugins || plugins.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="empty-icon">🔍</span>
                        <h3>Ничего не найдено</h3>
                        <p>Попробуйте изменить параметры поиска</p>
                    </div>
                `;
                return;
            }

            plugins.sort((a, b) => {
                if (a.is_running && !b.is_running) return -1;
                if (!a.is_running && b.is_running) return 1;
                if (a.is_installed && !b.is_installed) return -1;
                if (!a.is_installed && b.is_installed) return 1;
                return a.name.localeCompare(b.name);
            });

            container.innerHTML = plugins.map(plugin => renderPluginCard(plugin)).join('');
        }

        function renderPluginCard(plugin) {
            let iconHtml = '';
            if (plugin.icon_url) {
                iconHtml = `<img src="${plugin.icon_url}" alt="${plugin.name}" class="plugin-icon"
                              onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\\'plugin-icon-placeholder\\'><i class=\\'fas fa-puzzle-piece\\'></i></div>'">`;
            } else {
                iconHtml = `<div class="plugin-icon-placeholder"><i class="fas fa-puzzle-piece"></i></div>`;
            }

            const statusDot = plugin.is_installed
                ? `<span class="plugin-status-dot ${plugin.is_running ? 'running' : 'stopped'}"></span>`
                : '';

            let tags = '';
            if (plugin.is_installed) {
                tags += `<span class="tag tag-installed"><i class="fas fa-check"></i> Установлен</span>`;
                if (plugin.is_running) {
                    tags += `<span class="tag tag-running"><i class="fas fa-play"></i> Запущен</span>`;
                } else {
                    tags += `<span class="tag tag-stopped"><i class="fas fa-pause"></i> Остановлен</span>`;
                }
                if (plugin.has_update) {
                    tags += `<span class="tag tag-update"><i class="fas fa-sync-alt fa-spin"></i> Обновление</span>`;
                }
            } else {
                tags += `<span class="tag tag-available"><i class="fas fa-download"></i> Доступен</span>`;
            }

            let actions = '';

            if (plugin.is_installed) {
                if (plugin.is_running) {
                    actions += `<button onclick="stopPlugin('${plugin.id}')" class="btn btn-danger btn-sm">
                        <i class="fas fa-stop"></i>
                    </button>`;
                } else {
                    actions += `<button onclick="startPlugin('${plugin.id}')" class="btn btn-success btn-sm">
                        <i class="fas fa-play"></i>
                    </button>`;
                }
                actions += `<button onclick="openConfig('${plugin.id}')" class="btn btn-secondary btn-sm">
                    <i class="fas fa-sliders-h"></i>
                </button>`;
                actions += `<button onclick="uninstallPlugin('${plugin.id}')" class="btn btn-danger btn-sm">
                    <i class="fas fa-trash-alt"></i>
                </button>`;
                if (plugin.has_update) {
                    actions += `<button onclick="updatePlugin('${plugin.id}', '${plugin.download_url || ''}')" class="btn btn-warning btn-sm">
                        <i class="fas fa-sync-alt"></i>
                    </button>`;
                }
            } else {
                actions += `<button onclick="installPlugin('${plugin.id}', '${plugin.download_url}')" class="btn btn-primary btn-sm">
                    <i class="fas fa-download"></i> Установить
                </button>`;
            }

            const cardClass = plugin.is_running ? 'plugin-card running' : 'plugin-card';

            return `
                <div class="${cardClass}">
                    <div class="plugin-card-header">
                        <div class="plugin-icon-wrapper">
                            ${iconHtml}
                            ${statusDot}
                        </div>
                        <div class="plugin-info">
                            <div class="plugin-name-row">
                                <span class="plugin-name">${plugin.name}</span>
                                <span class="plugin-version-badge">v${plugin.version}</span>
                            </div>
                            <div class="plugin-author">
                                <i class="fas fa-user-circle"></i>
                                <span>${plugin.author}</span>
                            </div>
                        </div>
                    </div>
                    <div class="plugin-description">${plugin.description || 'Описание отсутствует'}</div>
                    <div class="plugin-tags">${tags}</div>
                    <div class="plugin-actions">${actions}</div>
                </div>
            `;
        }

        // ========== Действия с плагинами ==========
        function installPlugin(id, url) {
            if (!confirm(`Установить плагин "${id}"?`)) return;

            fetch('/api/install', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, download_url: url})
            })
            .then(res => res.json())
            .then(data => {
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) loadPlugins();
            })
            .catch(error => showToast('Ошибка: ' + error.message, 'error'));
        }

        function uninstallPlugin(id) {
            if (!confirm(`Удалить плагин "${id}"? Это действие нельзя отменить.`)) return;

            fetch('/api/uninstall', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id})
            })
            .then(res => res.json())
            .then(data => {
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) loadPlugins();
            })
            .catch(error => showToast('Ошибка: ' + error.message, 'error'));
        }

        function startPlugin(id) {
            fetch('/api/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id})
            })
            .then(res => res.json())
            .then(data => {
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) loadPlugins();
            })
            .catch(error => showToast('Ошибка: ' + error.message, 'error'));
        }

        function stopPlugin(id) {
            fetch('/api/stop', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id})
            })
            .then(res => res.json())
            .then(data => {
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) loadPlugins();
            })
            .catch(error => showToast('Ошибка: ' + error.message, 'error'));
        }

        function updatePlugin(id, url) {
            if (!confirm(`Обновить плагин "${id}"?`)) return;

            fetch('/api/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, download_url: url})
            })
            .then(res => res.json())
            .then(data => {
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) loadPlugins();
            })
            .catch(error => showToast('Ошибка: ' + error.message, 'error'));
        }

        function checkAllUpdates() {
            showToast('Проверка обновлений...', 'info');
            fetch('/api/check_updates')
                .then(res => res.json())
                .then(data => {
                    if (data.count > 0) {
                        showToast(`🔄 Найдено ${data.count} обновлений!`, 'success');
                        loadPlugins();
                    } else {
                        showToast('✅ Все плагины актуальны!', 'success');
                    }
                })
                .catch(error => showToast('Ошибка: ' + error.message, 'error'));
        }

        function rescanPlugins() {
            showToast('🔄 Сканирование папки plugins...', 'info');
            fetch('/api/rescan')
                .then(res => res.json())
                .then(data => {
                    showToast(data.message, 'success');
                    loadPlugins();
                })
                .catch(error => showToast('Ошибка: ' + error.message, 'error'));
        }

        function shutdownApp() {
            if (confirm('Закрыть Komit? Все запущенные плагины будут остановлены.')) {
                showToast('🔄 Завершение работы...', 'info');
                fetch('/api/shutdown', {
                    method: 'POST'
                })
                .then(() => {
                    setTimeout(() => {
                        window.close();
                    }, 1000);
                })
                .catch(() => {
                    window.close();
                });
            }
        }

        // ========== Конфиг ==========
        function openConfig(pluginId) {
            configPluginId = pluginId;
            document.getElementById('configTitle').textContent = `Конфигурация: ${pluginId}`;

            fetch(`/api/config/${pluginId}`)
                .then(res => res.json())
                .then(data => {
                    let content = data.exists
                        ? JSON.stringify(data.config, null, 2)
                        : '{\n  "message": "Нет конфигурации"\n}';
                    document.getElementById('configEditor').value = content;
                    document.getElementById('configModal').classList.add('active');
                })
                .catch(error => showToast('Ошибка: ' + error.message, 'error'));
        }

        function closeConfig() {
            document.getElementById('configModal').classList.remove('active');
            configPluginId = null;
        }

        function formatConfig() {
            try {
                const content = document.getElementById('configEditor').value;
                const parsed = JSON.parse(content);
                document.getElementById('configEditor').value = JSON.stringify(parsed, null, 2);
                showToast('✅ Отформатировано', 'success');
            } catch (e) {
                showToast('❌ Ошибка: ' + e.message, 'error');
            }
        }

        function saveConfig() {
            if (!configPluginId) return;

            try {
                const config = JSON.parse(document.getElementById('configEditor').value);

                fetch(`/api/config/${configPluginId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(config)
                })
                .then(res => res.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) closeConfig();
                })
                .catch(error => showToast('Ошибка: ' + error.message, 'error'));
            } catch (e) {
                showToast('❌ Ошибка в JSON: ' + e.message, 'error');
            }
        }

        // ========== Toast уведомления ==========
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${message}`;

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(40px)';
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        // ========== Вспомогательные ==========
        function showLoading() {
            document.getElementById('pluginsContainer').innerHTML = `
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Загрузка плагинов...</p>
                </div>
            `;
        }

        // Управление через клавиатуру
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('configModal').classList.contains('active')) closeConfig();
            }
        });
    </script>
</body>
</html>
